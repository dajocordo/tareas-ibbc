<p-menubar id="menuSuperior" [model]="items" syleClass="custom-menubar">
  <ng-template #item let-item let-root="root">
    <a pRipple class="flex items-center p-menubar-item-link" href="{{ item.url }}">
      <span>{{ item.label }}</span>
      <i class="{{ item.icon }}"></i>
    </a>
  </ng-template>
</p-menubar>
